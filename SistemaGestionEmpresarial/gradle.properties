# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Habilita AndroidX
android.useAndroidX=true

# Estilo de código de Kotlin
kotlin.code.style=official

# R class no transitiva (mejora tiempos de compilación)
android.nonTransitiveRClass=true

# ESTA LÍNEA ES NECESARIA para que KSP/Room funcionen con AGP 9.1+
android.disallowKotlinSourceSets=false

# Fix for jlink issue: Prefer auto-downloading a valid JDK over using broken system JREs
org.gradle.java.installations.auto-detect=false
org.gradle.java.installations.auto-download=true
# If you have a valid JDK installed, you can uncomment and set the path below:
# org.gradle.java.installations.paths=C:/Program Files/Java/jdk-17